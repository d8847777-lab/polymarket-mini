name: Run Bot
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install vk-api
      - name: Run bot
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
        run: python bot.py
